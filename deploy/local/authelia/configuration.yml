---
# Minimal Authelia config for local users-module development.
#
# Reference: https://www.authelia.com/configuration/prologue/introduction/
#
# Secrets (identity_validation.reset_password.jwt_secret, session.secret,
# storage.encryption_key, identity_providers.oidc.hmac_secret) are supplied via
# env vars (AUTHELIA_*) defined in docker-compose.yml. This keeps real secret
# material out of the YAML on disk.
#
# The OIDC signing key is inlined below because it is a dev-only key already
# committed to the repo. For non-local use, supply it via env or a secrets
# manager.

server:
  address: "tcp://0.0.0.0:9091"

log:
  level: info
  format: text

theme: light

totp:
  issuer: users-module-local

# File-backed user database. See users_database.yml.
authentication_backend:
  password_reset:
    disable: false
  refresh_interval: 5m
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2id
      iterations: 1
      key_length: 32
      salt_length: 16
      memory: 65536
      parallelism: 8

# Permissive access control — local dev only. Real authz lives in the API.
access_control:
  default_policy: one_factor

session:
  name: authelia_session
  expiration: 1h
  inactivity: 5m
  remember_me: 1M
  cookies:
    - domain: localhost
      authelia_url: http://localhost:9091
      default_redirection_url: http://localhost:3000/

regulation:
  max_retries: 5
  find_time: 2m
  ban_time: 5m

# Local-only storage. SQLite written to /data (a writable path inside the
# container) so it works even when /config is mounted read-only.
storage:
  local:
    path: /data/db.sqlite3

notifier:
  disable_startup_check: true
  smtp:
    host: mailhog
    port: 1025
    sender: "Authelia <noreply@example.test>"
    disable_require_tls: true
    disable_html_emails: false

