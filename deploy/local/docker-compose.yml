---
# Local development stack for users-module.
#
# Usage:
#   make dev.start        # from monorepo root (recommended)
#   docker compose up -d  # from this directory
#
# Services:
#   - postgres : PostgreSQL 16 (data store)
#   - authelia : OIDC provider (real OIDC, no mocks per dev/prod parity rule)
#   - mailpit  : SMTP catcher for email-code auth flow testing (multi-arch)
#   - api      : Go API server (builds from source, runs migrations on start)
#   - gui      : Next.js dev server (hot-reload via volume mount)

name: users-module

networks:
  users-module-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  authelia-data:
    driver: local

services:
  # ---- Infrastructure -------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    container_name: users-module-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-users}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-users}
      POSTGRES_DB: ${POSTGRES_DB:-users}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - users-module-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-users} -d ${POSTGRES_DB:-users}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  authelia:
    image: authelia/authelia:4.38
    container_name: users-module-authelia
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET: ${AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET:-change-me-jwt-secret-at-least-32-chars-long}
      AUTHELIA_SESSION_SECRET: ${AUTHELIA_SESSION_SECRET:-change-me-session-secret-at-least-32-chars}
      AUTHELIA_STORAGE_ENCRYPTION_KEY: ${AUTHELIA_STORAGE_ENCRYPTION_KEY:-change-me-storage-encryption-key-at-least-32}
      AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET: ${AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET:-change-me-oidc-hmac-secret-at-least-32}
    volumes:
      - ./authelia:/config:ro
      - ./authelia/certs:/certs:ro
      - authelia-data:/data
    ports:
      - "${AUTHELIA_PORT:-9091}:9091"
    networks:
      - users-module-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --no-check-certificate -O- https://localhost:9091/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # MailHog (mailhog/mailhog:v1.0.1) is amd64-only and unmaintained
  # since 2020; Mailpit is the maintained multi-arch successor with
  # a compatible SMTP surface and a nicer web UI, both on the same
  # default ports (1025 / 8025). Swapping is a drop-in.
  mailpit:
    image: axllent/mailpit:latest
    container_name: users-module-mailpit
    restart: unless-stopped
    ports:
      - "${SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    networks:
      - users-module-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8025/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---- Application -----------------------------------------------------------

  api:
    build:
      context: ../..
      dockerfile: api/Dockerfile
    container_name: users-module-api
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      # Override localhost refs with container service names.
      DB_URL: postgresql://${POSTGRES_USER:-users}:${POSTGRES_PASSWORD:-users}@postgres:5432/${POSTGRES_DB:-users}?sslmode=disable
      SMTP_HOST: mailpit
      SERVER_ADDR: ":8080"
      # --- Auth providers (per-provider scheme, see api/internal/config/providers.go) ---
      # Authelia is the default local provider; Google is enabled at runtime
      # only when AUTH_PROVIDER_GOOGLE_CLIENT_ID is set on the host (empty
      # string disables it; the provider registry skips it).
      AUTH_PROVIDER_AUTHELIA_DISPLAY_NAME: Authelia (local)
      AUTH_PROVIDER_AUTHELIA_ISSUER_URL: https://authelia:9091
      AUTH_PROVIDER_AUTHELIA_CLIENT_ID: users-module
      AUTH_PROVIDER_AUTHELIA_CLIENT_SECRET: ${AUTH_PROVIDER_AUTHELIA_CLIENT_SECRET:-local-authelia-secret}
      AUTH_PROVIDER_AUTHELIA_CLAIM_STYLE: authelia
      # Google client id/secret are intentionally NOT listed here: `environment:`
      # values override `env_file:` values, and `${VAR:-}` substitution reads
      # from the host shell (not from .env), which would clobber any value the
      # user set in .env with the empty-string default. Listing the Authelia
      # secret above is fine because its non-empty default is the intended
      # fallback. For Google (and any future provider whose default is empty),
      # let env_file deliver the value unmodified.
      AUTH_OAUTH_REDIRECT_BASE_URL: http://localhost:8080
      AUTH_FRONTEND_RETURN_URL: http://localhost:3000/auth/oidc/return
      AUTH_ADMIN_ROLE: admin
    ports:
      - "8080:8080"
    volumes:
      # Mount Authelia's self-signed CA into the API container's local CA
      # directory so `update-ca-certificates` (run from entrypoint.sh) can
      # append it to the system trust store. This is a local-dev-only concern —
      # production OIDC providers serve certs chained to public CAs.
      - ./authelia/certs/cert.pem:/usr/local/share/ca-certificates/authelia.crt:ro
    networks:
      - users-module-net
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_healthy

  gui:
    build:
      context: ../..
      dockerfile: gui/Dockerfile.dev
    container_name: users-module-gui
    restart: unless-stopped
    environment:
      # The browser (on the host) makes API requests, so this must be the
      # host-accessible URL, not the container-internal service name.
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    volumes:
      # Mount source for hot-reload. Only source and config files are mounted;
      # node_modules installed in the image stay untouched (no host shadow).
      - ../../gui/src:/app/gui/src
      - ../../gui/public:/app/gui/public
      - ../../gui/next.config.ts:/app/gui/next.config.ts
      - ../../gui/tsconfig.json:/app/gui/tsconfig.json
      - ../../gui/postcss.config.mjs:/app/gui/postcss.config.mjs
      - ../../gui/components.json:/app/gui/components.json
      - ../../gui/eslint.config.mjs:/app/gui/eslint.config.mjs
    networks:
      - users-module-net
    depends_on:
      - api
